<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>平抛运动动画</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f2f5f8;
      font-family: "Microsoft YaHei", "Microsoft YaHei UI", Arial, sans-serif;
      color: #263238;
    }

    .app {
      width: 940px;
      padding: 18px;
      background: #ffffff;
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 24px;
      text-align: center;
    }

    canvas {
      display: block;
      width: 900px;
      height: 560px;
      background: #eef7ff;
      border: 1px solid #cfd8dc;
      border-radius: 10px;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr auto;
      gap: 14px;
      align-items: end;
      margin-top: 14px;
    }

    label {
      display: block;
      font-size: 14px;
      margin-bottom: 6px;
    }

    input[type="range"] {
      width: 100%;
    }

    .buttons {
      display: flex;
      gap: 8px;
    }

    button {
      padding: 8px 16px;
      border: 0;
      border-radius: 8px;
      background: #1976d2;
      color: white;
      font-size: 14px;
      cursor: pointer;
    }

    button:hover {
      background: #0d47a1;
    }

    button.secondary {
      background: #607d8b;
    }

    button.secondary:hover {
      background: #455a64;
    }

    .info {
      margin-top: 12px;
      font-size: 15px;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <main class="app">
    <h1>平抛运动动画</h1>
    <canvas id="canvas" width="900" height="560"></canvas>

    <section class="controls">
      <div>
        <label for="v0">初速度 v₀：<span id="v0Value">18.0</span> m/s</label>
        <input id="v0" type="range" min="5" max="40" step="0.1" value="18">
      </div>

      <div>
        <label for="height">抛出高度 h：<span id="heightValue">22.0</span> m</label>
        <input id="height" type="range" min="5" max="35" step="0.1" value="22">
      </div>

      <div>
        <label for="timeScale">播放速度：<span id="timeScaleValue">1.0</span> 倍</label>
        <input id="timeScale" type="range" min="0.4" max="2.5" step="0.1" value="1">
      </div>

      <div class="buttons">
        <button id="toggle">开始/暂停</button>
        <button id="reset" class="secondary">重置</button>
      </div>
    </section>

    <div id="info" class="info"></div>
  </main>

  <script>
    const WIDTH = 900;
    const HEIGHT = 560;
    const LEFT_MARGIN = 70;
    const TOP_MARGIN = 60;
    const SCALE = 12;
    const G = 9.8;

    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    const v0Input = document.getElementById("v0");
    const heightInput = document.getElementById("height");
    const timeScaleInput = document.getElementById("timeScale");
    const v0Value = document.getElementById("v0Value");
    const heightValue = document.getElementById("heightValue");
    const timeScaleValue = document.getElementById("timeScaleValue");
    const toggleButton = document.getElementById("toggle");
    const resetButton = document.getElementById("reset");
    const info = document.getElementById("info");

    let running = false;
    let elapsed = 0;
    let lastTimestamp = null;
    let pathPoints = [];

    function v0() {
      return Number(v0Input.value);
    }

    function launchHeight() {
      return Number(heightInput.value);
    }

    function timeScale() {
      return Number(timeScaleInput.value);
    }

    function origin() {
      return { x: LEFT_MARGIN, y: TOP_MARGIN };
    }

    function groundY() {
      return TOP_MARGIN + launchHeight() * SCALE;
    }

    function flightTime() {
      return Math.sqrt(2 * launchHeight() / G);
    }

    function positionAt(t) {
      return {
        x: v0() * t,
        y: 0.5 * G * t * t
      };
    }

    function drawArrow(fromX, fromY, toX, toY, color, width = 3) {
      const angle = Math.atan2(toY - fromY, toX - fromX);
      const headLength = 12;

      ctx.beginPath();
      ctx.moveTo(fromX, fromY);
      ctx.lineTo(toX, toY);
      ctx.strokeStyle = color;
      ctx.lineWidth = width;
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(toX, toY);
      ctx.lineTo(
        toX - headLength * Math.cos(angle - Math.PI / 6),
        toY - headLength * Math.sin(angle - Math.PI / 6)
      );
      ctx.lineTo(
        toX - headLength * Math.cos(angle + Math.PI / 6),
        toY - headLength * Math.sin(angle + Math.PI / 6)
      );
      ctx.closePath();
      ctx.fillStyle = color;
      ctx.fill();
    }

    function drawDashedLine(x1, y1, x2, y2, color) {
      ctx.save();
      ctx.setLineDash([4, 3]);
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.strokeStyle = color;
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.restore();
    }

    function drawFrame() {
      ctx.clearRect(0, 0, WIDTH, HEIGHT);

      const start = origin();
      const floorY = groundY();
      const totalTime = flightTime();
      const range = v0() * totalTime;
      const position = positionAt(elapsed);

      let ballX = start.x + position.x * SCALE;
      let ballY = start.y + position.y * SCALE;

      if (ballY >= floorY) {
        ballY = floorY;
        running = false;
        lastTimestamp = null;
      }

      const lastPoint = pathPoints[pathPoints.length - 1];
      if (!lastPoint || lastPoint.x !== ballX || lastPoint.y !== ballY) {
        pathPoints.push({ x: ballX, y: ballY });
      }

      // 地面、发射平台和坐标辅助线
      ctx.fillStyle = "#eef7ff";
      ctx.fillRect(0, 0, WIDTH, HEIGHT);
      ctx.fillStyle = "#c8e6a0";
      ctx.fillRect(0, floorY, WIDTH, HEIGHT - floorY);
      drawDashedLine(LEFT_MARGIN, TOP_MARGIN, LEFT_MARGIN, floorY, "#888");

      ctx.beginPath();
      ctx.moveTo(LEFT_MARGIN, floorY);
      ctx.lineTo(WIDTH - 40, floorY);
      ctx.strokeStyle = "#666";
      ctx.lineWidth = 2;
      ctx.stroke();

      ctx.fillStyle = "#8d6e63";
      ctx.fillRect(start.x - 48, start.y - 12, 48, 24);
      ctx.fillStyle = "#444";
      ctx.font = "15px Microsoft YaHei";
      ctx.textAlign = "right";
      ctx.textBaseline = "middle";
      ctx.fillText("抛出点", start.x - 55, start.y);

      // 运动轨迹
      if (pathPoints.length > 1) {
        ctx.beginPath();
        ctx.moveTo(pathPoints[0].x, pathPoints[0].y);
        for (const point of pathPoints.slice(1)) {
          ctx.lineTo(point.x, point.y);
        }
        ctx.strokeStyle = "#1565c0";
        ctx.lineWidth = 2;
        ctx.stroke();
      }

      // 水平速度箭头和重力箭头
      drawArrow(ballX, ballY, ballX + 60, ballY, "#2e7d32");
      ctx.fillStyle = "#2e7d32";
      ctx.textAlign = "left";
      ctx.fillText("v₀", ballX + 66, ballY);

      drawArrow(ballX, ballY, ballX, ballY + 55, "#c62828");
      ctx.fillStyle = "#c62828";
      ctx.fillText("g", ballX + 8, ballY + 58);

      // 小球
      ctx.beginPath();
      ctx.arc(ballX, ballY, 11, 0, Math.PI * 2);
      ctx.fillStyle = "#ff8f00";
      ctx.fill();
      ctx.strokeStyle = "#e65100";
      ctx.lineWidth = 2;
      ctx.stroke();

      // 理论落点
      const landingX = start.x + range * SCALE;
      ctx.beginPath();
      ctx.moveTo(landingX, floorY - 10);
      ctx.lineTo(landingX, floorY + 10);
      ctx.strokeStyle = "#6a1b9a";
      ctx.lineWidth = 2;
      ctx.stroke();

      ctx.fillStyle = "#6a1b9a";
      ctx.textAlign = "center";
      ctx.textBaseline = "alphabetic";
      ctx.fillText("理论落点", landingX, floorY + 24);

      info.textContent =
        `时间 t = ${elapsed.toFixed(2)} s    ` +
        `水平位移 x = ${position.x.toFixed(2)} m    ` +
        `竖直位移 y = ${Math.min(position.y, launchHeight()).toFixed(2)} m    ` +
        `飞行时间 = ${totalTime.toFixed(2)} s    ` +
        `水平射程 = ${range.toFixed(2)} m`;
    }

    function animate(timestamp) {
      if (!running) {
        return;
      }

      if (lastTimestamp === null) {
        lastTimestamp = timestamp;
      }

      const deltaSeconds = (timestamp - lastTimestamp) / 1000;
      lastTimestamp = timestamp;
      elapsed += deltaSeconds * timeScale();

      if (elapsed > flightTime()) {
        elapsed = flightTime();
      }

      drawFrame();

      if (running) {
        requestAnimationFrame(animate);
      }
    }

    function reset() {
      running = false;
      elapsed = 0;
      lastTimestamp = null;
      pathPoints = [];
      updateLabels();
      drawFrame();
    }

    function updateLabels() {
      v0Value.textContent = v0().toFixed(1);
      heightValue.textContent = launchHeight().toFixed(1);
      timeScaleValue.textContent = timeScale().toFixed(1);
    }

    toggleButton.addEventListener("click", () => {
      running = !running;
      if (running) {
        requestAnimationFrame(animate);
      } else {
        lastTimestamp = null;
      }
    });

    resetButton.addEventListener("click", reset);

    v0Input.addEventListener("input", reset);
    heightInput.addEventListener("input", reset);
    timeScaleInput.addEventListener("input", () => {
      updateLabels();
    });

    reset();
  </script>
</body>
</html>
